# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poi-e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POI_SERVER_POSTGRES_E2E_URL: postgres://postgres:postgres@127.0.0.1:5432/poi-e2e

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test:unit
      - name: Run Mongo e2e tests
        run: npm run test:e2e
        env:
          POI_SERVER_DB: mongodb://127.0.0.1:27017/poi-e2e
      - name: Apply PostgreSQL migrations to the e2e database
        run: npm run db:migrate
        env:
          POI_SERVER_DATABASE_URL: ${{ env.POI_SERVER_POSTGRES_E2E_URL }}
      - name: Run PostgreSQL e2e tests
        run: npm run test:e2e:postgres
        env:
          POI_SERVER_POSTGRES_E2E_URL: ${{ env.POI_SERVER_POSTGRES_E2E_URL }}
          CI: true
      - run: npm run build
      - run: npm run smoke
      - name: Validate deploy hooks
        run: |
          bash -n github-master-hook
          bash -n fnm-exec
          python - <<'PY'
          from pathlib import Path

          for name in ("github-master-hook", "fnm-exec", "supervisior.conf"):
              data = Path(name).read_bytes()
              if b"\r" in data:
                  raise SystemExit(f"{name} contains CRLF line endings")
          PY
