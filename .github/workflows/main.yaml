# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: poi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d poi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test:unit
      - name: Run e2e tests
        run: npm run test:e2e
        env:
          POI_SERVER_DB: mongodb://127.0.0.1:27017/poi-e2e
      - name: Run PostgreSQL migrations
        run: npm run db:migrate
        env:
          POI_SERVER_DATABASE_URL: postgres://postgres@127.0.0.1:5432/poi_test
          POI_TEST_POSTGRES_URL: postgres://postgres@127.0.0.1:5432/poi_test
      - name: Run PostgreSQL e2e tests
        run: npm run test:e2e:postgres
        env:
          POI_SERVER_DATABASE_URL: postgres://postgres@127.0.0.1:5432/poi_test
          POI_TEST_POSTGRES_URL: postgres://postgres@127.0.0.1:5432/poi_test
      - run: npm run build
      - run: npm run smoke
      - name: Validate deploy hooks
        run: |
          bash -n github-master-hook
          bash -n fnm-exec
          ! grep -Il $'\r' github-master-hook fnm-exec supervisior.conf
